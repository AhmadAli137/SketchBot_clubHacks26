name: Release Desktop App

# Triggers on version tags: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: '20'

# Required secrets in GitHub → Settings → Secrets and variables → Actions:
#   R2_ACCESS_KEY_ID      — Cloudflare R2 Access Key ID
#   R2_SECRET_ACCESS_KEY  — Cloudflare R2 Secret Access Key
#   R2_ENDPOINT           — https://<account_id>.r2.cloudflarestorage.com
#   R2_BUCKET             — bucket name, e.g. aibotics-releases

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create GitHub Release

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Python (icon generation) ─────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate Spark icon
        run: python apps/desktop/electron/gen-icon.py

      # ── Bundle portable Python (embeddable distribution) ─────────────────
      # A venv is not portable — its pyvenv.cfg points to the CI runner's
      # Python path which won't exist on end-user machines. The embeddable
      # distribution IS designed to be shipped with applications.
      - name: Bundle embeddable Python + runtime deps
        shell: bash
        run: |
          PY_VER="3.11.9"
          PY_DIR="services/local-runtime/python-dist"
          curl -sL -o python-embed.zip \
            "https://www.python.org/ftp/python/${PY_VER}/python-${PY_VER}-embed-amd64.zip"
          mkdir -p "$PY_DIR"
          unzip -q python-embed.zip -d "$PY_DIR"
          # Enable site-packages so pip-installed packages are importable
          echo "import site" >> "$PY_DIR/python311._pth"
          # Bootstrap pip
          curl -sL -o get-pip.py "https://bootstrap.pypa.io/get-pip.py"
          "$PY_DIR/python.exe" get-pip.py --quiet
          # Install runtime requirements
          "$PY_DIR/python.exe" -m pip install \
            -r services/local-runtime/requirements.txt \
            --quiet --no-warn-script-location

      # ── Install all workspace dependencies from repo root ───────────────
      - name: Install all dependencies
        run: npm ci

      # Workspace-local packages (e.g. qrcode) may not be hoisted by root
      # npm ci, so install them explicitly in the renderer directory.
      - name: Install renderer local dependencies
        working-directory: apps/desktop/renderer
        run: npm install --no-package-lock

      # ── Build renderer (Next.js static export) ───────────────────────────
      - name: Build Next.js (static export)
        working-directory: apps/desktop/renderer
        run: npm run build

      - name: Build Windows NSIS installer
        working-directory: apps/desktop
        # --publish=never — we handle upload ourselves below
        run: npx electron-builder --win --publish=never

      # ── Rename artifact to a clean filename ──────────────────────────────
      - name: Rename installer
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          SRC=$(ls "apps/desktop/dist/"*.exe | head -1)
          DEST="apps/desktop/dist/Aibotics-Setup-${VERSION}.exe"
          mv "$SRC" "$DEST"
          echo "INSTALLER_PATH=$DEST" >> "$GITHUB_ENV"
          echo "INSTALLER_NAME=Aibotics-Setup-${VERSION}.exe" >> "$GITHUB_ENV"

      # ── Upload to Cloudflare R2 ──────────────────────────────────────────
      - name: Configure AWS CLI for R2
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto

      - name: Upload versioned installer to R2
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          aws s3 cp "${{ env.INSTALLER_PATH }}" \
            "s3://${{ secrets.R2_BUCKET }}/releases/${VERSION}/${{ env.INSTALLER_NAME }}" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

      - name: Update latest alias on R2
        shell: bash
        run: |
          aws s3 cp "${{ env.INSTALLER_PATH }}" \
            "s3://${{ secrets.R2_BUCKET }}/latest/Aibotics-Setup.exe" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

      - name: Upload latest.yml (electron-updater manifest)
        shell: bash
        run: |
          aws s3 cp "apps/desktop/dist/latest.yml" \
            "s3://${{ secrets.R2_BUCKET }}/latest.yml" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

      # Patch the release URL inside latest.yml so electron-updater fetches
      # from the CDN (R2) rather than GitHub Assets
      - name: Patch latest.yml with CDN URL
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          CDN="${{ secrets.RELEASE_CDN_URL }}"   # e.g. https://releases.aibotics.app
          # Replace the path line so electron-updater downloads from CDN
          sed -i "s|path:.*|path: ${CDN}/releases/${VERSION}/${{ env.INSTALLER_NAME }}|" \
            apps/desktop/dist/latest.yml
          aws s3 cp "apps/desktop/dist/latest.yml" \
            "s3://${{ secrets.R2_BUCKET }}/latest.yml" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

      # ── Create GitHub Release (changelog + source download) ──────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.INSTALLER_PATH }}
            apps/desktop/dist/latest.yml
