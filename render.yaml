services:
  - type: web
    name: sketchbot-backend
    runtime: docker
    rootDir: backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "8000"
      - key: OPENAI_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: BACKEND_CORS_ORIGIN_REGEX
        sync: false
      - key: WEBRTC_ICE_PROVIDER
        sync: false
      - key: WEBRTC_STUN_URLS
        sync: false
      - key: WEBRTC_TURN_URLS
        sync: false
      - key: WEBRTC_TURN_USERNAME
        sync: false
      - key: WEBRTC_TURN_CREDENTIAL
        sync: false
      - key: WEBRTC_ICE_SERVERS_JSON
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_API_KEY
        sync: false
      - key: TWILIO_API_SECRET
        sync: false
      - key: TWILIO_TOKEN_TTL
        sync: false
