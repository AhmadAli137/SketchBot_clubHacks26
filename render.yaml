services:
  - type: web
    name: sketchbot-backend
    runtime: python
    rootDir: services/cloud-backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CLOUD_CORS_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$
      - key: CLOUD_CORS_ORIGINS
        sync: false
      - key: SKETCHBOT_CLOUD_DATA_FILE
        sync: false
