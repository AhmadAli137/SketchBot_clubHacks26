<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SketchBot Desktop</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef5ff;
        --panel: rgba(255, 255, 255, 0.92);
        --text: #18314c;
        --muted: #60738f;
        --cyan: #4fc8ff;
        --violet: #8d63ff;
        --pink: #ff74d8;
        --danger: #d84f72;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        font-family: "Segoe UI", Inter, system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 18%, rgba(79, 200, 255, 0.18), transparent 22%),
          radial-gradient(circle at 82% 14%, rgba(141, 99, 255, 0.16), transparent 24%),
          radial-gradient(circle at 72% 82%, rgba(255, 116, 216, 0.16), transparent 22%),
          linear-gradient(180deg, #f7fbff 0%, #eaf2ff 100%);
      }

      .shell {
        width: min(720px, 100%);
        padding: 28px;
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid rgba(113, 132, 255, 0.16);
        box-shadow: 0 24px 48px rgba(86, 105, 166, 0.14);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #5574b0;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.05;
      }

      p {
        margin: 0;
      }

      .subtitle {
        margin-top: 12px;
        color: var(--muted);
        line-height: 1.6;
      }

      .status {
        margin-top: 22px;
        display: grid;
        gap: 12px;
        padding: 18px;
        border-radius: 20px;
        background: rgba(240, 247, 255, 0.94);
        border: 1px solid rgba(79, 200, 255, 0.18);
      }

      .status strong {
        font-size: 18px;
      }

      .detail {
        color: var(--muted);
        line-height: 1.55;
      }

      .detail.error {
        color: var(--danger);
        font-weight: 700;
      }

      .spinner {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        border: 4px solid rgba(79, 200, 255, 0.18);
        border-top-color: var(--violet);
        animation: spin 0.9s linear infinite;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .actions {
        margin-top: 16px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 800;
        color: #18314c;
        background: linear-gradient(135deg, var(--cyan), #c7f1ff);
        cursor: pointer;
      }

      button.secondary {
        background: rgba(235, 241, 255, 0.96);
      }

      .pairing {
        margin-top: 18px;
        display: grid;
        gap: 10px;
      }

      .pairing-item {
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(247, 250, 255, 0.94);
        border: 1px solid rgba(113, 132, 255, 0.14);
        color: #36517f;
        font-family: Consolas, "SFMono-Regular", monospace;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">SketchBot Desktop</p>
      <h1>Starting your local robot studio</h1>
      <p class="subtitle">
        SketchBot runs camera vision, teleoperation, and robot control locally on this machine so the classroom
        experience stays fast even when the internet does not.
      </p>

      <section class="status">
        <div class="row">
          <div class="spinner" id="spinner"></div>
          <div>
            <strong id="message">Booting SketchBot Desktop...</strong>
            <p class="detail" id="detail">Preparing the local robot runtime.</p>
          </div>
        </div>
      </section>

      <section class="pairing" id="pairing" hidden></section>

      <div class="actions">
        <button id="retry" hidden>Retry startup</button>
        <button class="secondary" id="refresh">Refresh screen</button>
      </div>
    </main>

    <script>
      const messageEl = document.getElementById('message');
      const detailEl = document.getElementById('detail');
      const retryButton = document.getElementById('retry');
      const refreshButton = document.getElementById('refresh');
      const spinner = document.getElementById('spinner');
      const pairingSection = document.getElementById('pairing');

      const renderPairing = async () => {
        if (!window.sketchbotDesktop?.getPairingTargets) {
          return;
        }
        const targets = await window.sketchbotDesktop.getPairingTargets();
        if (!targets.length) {
          pairingSection.hidden = true;
          pairingSection.innerHTML = '';
          return;
        }
        pairingSection.hidden = false;
        pairingSection.innerHTML = `
          <p class="detail">When Camera Buddy is ready, use one of these local room addresses:</p>
          ${targets.map((target) => `<div class="pairing-item">${target}</div>`).join('')}
        `;
      };

      const updateState = (state) => {
        if (!state) {
          return;
        }
        messageEl.textContent = state.message || 'Starting SketchBot Desktop...';
        detailEl.textContent = state.detail || '';
        detailEl.classList.toggle('error', state.phase === 'error');
        retryButton.hidden = state.phase !== 'error';
        spinner.style.display = state.phase === 'error' ? 'none' : 'block';
        void renderPairing();
      };

      refreshButton.addEventListener('click', () => {
        window.location.reload();
      });

      retryButton.addEventListener('click', async () => {
        retryButton.disabled = true;
        try {
          const next = await window.sketchbotDesktop.retryLaunch();
          updateState(next);
        } finally {
          retryButton.disabled = false;
        }
      });

      window.sketchbotDesktop.getLaunchState().then(updateState);
      window.sketchbotDesktop.onLaunchState(updateState);
      void renderPairing();
    </script>
  </body>
</html>
