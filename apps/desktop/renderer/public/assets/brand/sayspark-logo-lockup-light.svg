<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#5de4ff" stop-opacity="0.28"/>
      <stop offset="58%" stop-color="#7c3aed" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#5de4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#fff2bf"/>
      <stop offset="34%" stop-color="#10bce8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="58%">
