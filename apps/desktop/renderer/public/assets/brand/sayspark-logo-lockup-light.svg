    <g transform="translate(16 16)">
      <path d="M 0 -14 L 3 -3 L 14 0 L 3 3 L 0 14 L -3 3 L -14 0 L -3 -3 Z" fill="url(#spark)"/>
      <path d="M 0 -6 L 1.4 -1.4 L 6 0 L 1.4 1.4 L 0 6 L -1.4 1.4 L -6 0 L -1.4 -1.4 Z" transform="rotate(45)" fill="#ffffff" opacity="0.58"/>
      <circle cx="0" cy="0" r="3.6" fill="url(#core)" opacity="0.58"/>
      <circle cx="0" cy="0" r="2" fill="#ffffff" opacity="0.98"/>
