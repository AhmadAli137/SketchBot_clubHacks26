  <g transform="translate(88 46) scale(11.5)" filter="url(#softGlow)">
    <line x1="16" y1="2" x2="16" y2="-2.2" stroke="url(#spark)" stroke-width="1" stroke-linecap="round"/>
    <circle cx="16" cy="-3.6" r="2.4" fill="#10bce8" opacity="0.26"/>
