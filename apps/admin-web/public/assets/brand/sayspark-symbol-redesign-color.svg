<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="100mm"
  height="100mm"
  viewBox="0 0 100 100"
  role="img"
  aria-label="SaySpark single spark color logo symbol"
>
  <title>SaySpark Single Spark - Color</title>
  <desc>The same single-spark silhouette styled with SaySpark cyan, blue, and violet glow.</desc>

  <defs>
    <radialGradient id="spark-fill" cx="43%" cy="38%" r="65%">
      <stop offset="0" stop-color="#fff6cf"/>
      <stop offset="0.34" stop-color="#5de4ff"/>
      <stop offset="0.72" stop-color="#4f8eff"/>
      <stop offset="1" stop-color="#a855f7"/>
    </radialGradient>
    <filter id="spark-glow" x="-25" y="-25" width="150" height="150" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.23 0 0 0 0 0.82 0 0 0 0 1 0 0 0 0.62 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#spark-glow)">
    <path
      fill="url(#spark-fill)"
      d="
        M50 5
        C52.8 24.5 57.8 36.2 66.4 40.3
        C75.1 44.5 86.7 47.4 95 50
        C86.7 52.6 75.1 55.5 66.4 59.7
        C57.8 63.8 52.8 75.5 50 95
        C47.2 75.5 42.2 63.8 33.6 59.7
        C24.9 55.5 13.3 52.6 5 50
        C13.3 47.4 24.9 44.5 33.6 40.3
        C42.2 36.2 47.2 24.5 50 5
        Z
      "
    />
    <circle cx="50" cy="50" r="8.6" fill="#ffffff" opacity="0.88"/>
    <circle cx="50" cy="50" r="4.8" fill="#5de4ff" opacity="0.72"/>
  </g>
</svg>
