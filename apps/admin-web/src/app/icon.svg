<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="ss-halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#5de4ff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#5de4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ss-spark" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#fff4d6"/>
      <stop offset="35%" stop-color="#5de4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </radialGradient>
    <radialGradient id="ss-core" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#5de4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Soft halo behind the spark — gives it presence on dark tab backgrounds -->
  <circle cx="16" cy="16" r="15" fill="url(#ss-halo)"/>
  <!-- Eight-pointed spark mark — the SaySpark brand glyph -->
  <g transform="translate(16 16)">
    <path d="M 0 -13 L 3 -3 L 13 0 L 3 3 L 0 13 L -3 3 L -13 0 L -3 -3 Z" fill="url(#ss-spark)"/>
    <!-- Inner cross-spark, 45° rotated, soft white -->
    <path d="M 0 -6 L 1.4 -1.4 L 6 0 L 1.4 1.4 L 0 6 L -1.4 1.4 L -6 0 L -1.4 -1.4 Z"
          transform="rotate(45)" fill="#ffffff" fill-opacity="0.50"/>
    <!-- Glowing core -->
    <circle cx="0" cy="0" r="3.6" fill="url(#ss-core)" fill-opacity="0.65"/>
    <circle cx="0" cy="0" r="2.0" fill="#ffffff" fill-opacity="0.96"/>
    <!-- Tiny accent sparkles -->
    <circle cx="6.5" cy="-5.5" r="0.7" fill="#ffffff" fill-opacity="0.80"/>
    <circle cx="-7.0" cy="6.0" r="0.6" fill="#ffffff" fill-opacity="0.65"/>
    <circle cx="-5.5" cy="-5.0" r="0.4" fill="#ffffff" fill-opacity="0.55"/>
  </g>
</svg>
